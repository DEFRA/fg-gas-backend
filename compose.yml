include:
  - path: ./compose/compose.gas.yml
    project_directory: .

services:
  floci:
    image: floci/floci:latest-compat
    ports:
      - "${FLOCI_PORT:-4566}:4566"
    env_file:
      - "compose/aws.env"
    environment:
      FLOCI_DEFAULT_REGION: eu-west-2
    volumes:
      - ./compose/floci/start.d:/etc/floci/init/start.d:ro
    healthcheck:
      test: ["CMD", "stat", "/tmp/READY"]
    networks:
      - cdp-tenant

  mongodb:
    image: mongo:6.0.13
    networks:
      - cdp-tenant
    ports:
      - "${MONGO_PORT:-27017}:27017"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval 'db.runCommand({ping:1}).ok' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    command:
      ["mongod", "--replSet", "mongoRepl", "--bind_ip", "localhost,mongodb"]
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    restart: always

  mongo-ready:
    image: mongo:6.0.13
    networks: [cdp-tenant]
    environment:
      PRIMARY: "mongodb:27017"
      REPLSET: "mongoRepl"
    volumes:
      - ./scripts/wait-for-replicaset.sh:/wait-for-replicaset.sh:ro
    entrypoint: ["/bin/bash", "/wait-for-replicaset.sh"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh 'mongodb://mongodb:27017/?directConnection=true' --quiet --eval 'db.hello().isWritablePrimary' | grep -q true || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 60

volumes:
  mongodb-data:
  mongodb-config:

networks:
  cdp-tenant:
    driver: bridge
