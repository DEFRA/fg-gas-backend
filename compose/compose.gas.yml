services:
  gas:
    build: .
    networks:
      - cdp-tenant
    ports:
      - "${GAS_PORT:-3102}:3102"
    env_file:
      - .env
    environment:
      PORT: 3102
      MONGO_URI: mongodb://mongodb:27017/?replicaSet=mongoRepl
      AWS_ENDPOINT_URL: "http://floci:4566"
      OUTBOX_POLL_MS: "${OUTBOX_POLL_MS}"
      INBOX_POLL_MS: "${INBOX_POLL_MS}"
      GRANT_FUNDING_CALCULATOR_URL: "${GRANT_FUNDING_CALCULATOR_URL}"
    depends_on:
      mongo-ready:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      floci:
        condition: service_healthy
    develop:
      watch:
        - path: ./src
          target: /home/node/src
          action: sync+restart
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./migrate-mongo-config.js:/home/node/migrate-mongo-config.js
      - ./migrations:/home/node/migrations
      - ./package.json:/home/node/package.json
