name: Pact Provider Verification

on:
  workflow_call:
    inputs:
      publish-verification:
        type: boolean
        default: false

jobs:
  pact:
    name: Verify Pacts
    runs-on: self-hosted

    steps:
      - name: Mask secrets
        run: |
          echo "::add-mask::$PACT_USER"
          echo "::add-mask::$PACT_PASS"

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch latest tags
        run: git fetch --tags --force

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run provider contract tests
        env:
          PACT_BROKER_BASE_URL: https://ffc-pact-broker.azure.defra.cloud
          PACT_PUBLISH_VERIFICATION: ${{ inputs.publish-verification }}
        run: |
          npm run test:contract -- test/contract/provider.cw-backend.test.js
          npm run test:contract -- test/contract/provider.agreements-api.test.js
